name: Unit & Integration Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_call:
    secrets:
      SecretKey:
        required: true

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj*', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore CookingBlogBackend/PostApiService.sln
      
      - name: Build Solution
        run: dotnet build CookingBlogBackend/PostApiService.sln --configuration Release --no-restore
      
      - name: Run Tests with Coverage
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          JwtConfiguration__SecretKey: ${{ secrets.SecretKey }}
        run: >
          dotnet test CookingBlogBackend/PostApiService.Tests/PostApiService.Tests.csproj 
          --configuration Release 
          --no-build 
          --verbosity normal 
          --collect:"XPlat Code Coverage"
      
      - name: Publish API
        run: dotnet publish CookingBlogBackend/PostApiService/PostApiService.csproj --configuration Release --no-build -o ./publish
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: ./publish/