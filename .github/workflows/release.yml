name: Production Release

concurrency:
  group: production_deployment_group
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]

jobs:
  test-before-release:
    uses: ./.github/workflows/_tests.yml
    secrets:
      SecretKey: ${{ secrets.JWT_SECRET_KEY }}

  create-release:
    needs: test-before-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app
          path: ./app-bin
     
      - name: Zip Artifact for Release
        run: zip -r cooking-blog-api.zip ./app-bin
      
      - name: Conventional Changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          git-user-name: "github-actions[bot]"
          git-user-email: "github-actions[bot]@users.noreply.github.com"
          output-file: "CHANGELOG.md"
          tag-prefix: "v"
          skip-version-file: "true"
          skip-on-empty: "false"
          skip-commit: "true"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.changelog.outputs.skipped == 'false'
        with:
          body: ${{ steps.changelog.outputs.clean_changelog }}
          tag_name: ${{ steps.changelog.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: cooking-blog-api.zip

  deploy-production:
    needs: create-release
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: Production
    secrets:     
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}