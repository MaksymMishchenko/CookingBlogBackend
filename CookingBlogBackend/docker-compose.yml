version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: cooking-blog-db
    restart: always
    environment:
      POSTGRES_USER: cooking
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: cooking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: